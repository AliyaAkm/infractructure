name: Prepare Server Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "deploy/docker-compose.prod.yml"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

concurrency:
  group: zerde-production-infra-deploy
  cancel-in-progress: true

jobs:
  deploy-infra:
    name: Copy compose and start infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e

            mkdir -p "${{ secrets.SERVER_DEPLOY_PATH }}"

            mkdir -p \
              "${{ secrets.SERVER_DEPLOY_PATH }}/gateway" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/auth-service" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/curriculum-service" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/storage-service" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/payment-service" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/notification-service" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/AI-service" \
              "${{ secrets.SERVER_DEPLOY_PATH }}/Code-Runner-Service"

      - name: Copy production compose to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "deploy/docker-compose.prod.yml"
          target: "${{ secrets.SERVER_DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Start shared infrastructure
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"

            if [ ! -f .env ]; then
              echo ".env not found in ${{ secrets.SERVER_DEPLOY_PATH }}"
              exit 1
            fi

            if ! grep -q "^DOCKERHUB_USERNAME=" .env; then
              echo "" >> .env
              echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            fi

            find . -name ".env" -type f -exec chmod 600 {} \;

            docker compose -f docker-compose.prod.yml up -d postgres redis minio redpanda minio-init