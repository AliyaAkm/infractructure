name: Prepare Server Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "deploy/docker-compose.prod.yml"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

concurrency:
  group: zerde-production-infra-deploy
  cancel-in-progress: true

jobs:
  deploy-infra:
    name: Copy compose, create env files, start infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.SERVER_DEPLOY_PATH }}"

      - name: Copy production compose to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "deploy/docker-compose.prod.yml"
          target: "${{ secrets.SERVER_DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Create env files and start shared infrastructure
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"

            mkdir -p gateway auth-service curriculum-service storage-service payment-service notification-service AI-service Code-Runner-Service

            cat > .env <<'ENVEOF'
            ${{ secrets.ROOT_ENV }}
            ENVEOF
            cat > gateway/.env <<'ENVEOF'
            ${{ secrets.GATEWAY_ENV }}
            ENVEOF
            cat > auth-service/.env <<'ENVEOF'
            ${{ secrets.AUTH_ENV }}
            ENVEOF
            cat > curriculum-service/.env <<'ENVEOF'
            ${{ secrets.CURRICULUM_ENV }}
            ENVEOF
            cat > storage-service/.env <<'ENVEOF'
            ${{ secrets.STORAGE_ENV }}
            ENVEOF
            cat > payment-service/.env <<'ENVEOF'
            ${{ secrets.PAYMENT_ENV }}
            ENVEOF
            cat > notification-service/.env <<'ENVEOF'
            ${{ secrets.NOTIFICATION_ENV }}
            ENVEOF
            cat > AI-service/.env <<'ENVEOF'
            ${{ secrets.AI_ENV }}
            ENVEOF
            cat > Code-Runner-Service/.env <<'ENVEOF'
            ${{ secrets.CODE_RUNNER_ENV }}
            ENVEOF

            {
              echo ""
              echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}"
            } >> .env

            chmod 600 .env gateway/.env auth-service/.env curriculum-service/.env storage-service/.env payment-service/.env notification-service/.env AI-service/.env Code-Runner-Service/.env

            docker compose -f docker-compose.prod.yml up -d postgres redis minio redpanda minio-init
